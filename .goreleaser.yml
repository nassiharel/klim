version: 2

project_name: clim

before:
  hooks:
    - go mod tidy

builds:
  - id: clim
    main: ./cmd/clim
    binary: clim
    env:
      - CGO_ENABLED=0
      - SOURCE_DATE_EPOCH={{ .CommitTimestamp }}
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/nassiharel/clim/internal/build.Version={{.Version}}
      - -X github.com/nassiharel/clim/internal/build.Commit={{.ShortCommit}}
      - -X github.com/nassiharel/clim/internal/build.Date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: clim
    vendor: nassiharel
    homepage: https://github.com/nassiharel/clim
    maintainer: nassiharel
    description: >-
      One command to discover, inspect, and upgrade every CLI on your system.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

brews:
  - repository:
      owner: nassiharel
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/nassiharel/clim
    description: >-
      One command to discover, inspect, and upgrade every CLI on your system.
    license: MIT
    install: |
      bin.install "clim"
    test: |
      system bin/"clim", "version"

sboms:
  - artifacts: archive

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-devel"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Dependencies
      regexp: '^.*?(deps|build\(deps\))(\(.+\))?\!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: nassiharel
    name: clim
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    **Homebrew**: `brew install nassiharel/tap/clim`
    **Go**: `go install github.com/nassiharel/clim/cmd/clim@v{{ .Version }}`
    **Debian/Ubuntu**: `sudo dpkg -i clim_{{ .Version }}_linux_amd64.deb`
    **RPM**: `sudo rpm -i clim_{{ .Version }}_linux_amd64.rpm`
    **Binary**: Download from the assets below
