version: 2

project_name: klim

before:
  hooks:
    - go mod download
    - go generate ./...
    - go mod tidy

builds:
  - id: klim
    main: ./cmd/klim
    binary: klim
    env:
      - CGO_ENABLED=0
      - SOURCE_DATE_EPOCH={{ .CommitTimestamp }}
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/nassiharel/klim/internal/build.Version={{.Version}}
      - -X github.com/nassiharel/klim/internal/build.Commit={{.ShortCommit}}
      - -X github.com/nassiharel/klim/internal/build.Date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: klim
    vendor: nassiharel
    homepage: https://github.com/nassiharel/klim
    maintainer: nassiharel
    description: >-
      Deterministic developer toolchains across local machines, teams, CI, and agents.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

brews:
  - repository:
      owner: nassiharel
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/nassiharel/klim
    description: >-
      Productivity booster for dev tools — discover, standardise, automate, audit toolchains.
    license: MIT
    install: |
      bin.install "klim"
    test: |
      system bin/"klim", "version"

# Scoop bucket: Windows users add the bucket once and `scoop install klim`
# from then on. Manifest is written to nassiharel/scoop-bucket on every
# release; the SCOOP_TAP_TOKEN secret needs Contents: read & write on
# that bucket repo.
scoops:
  - repository:
      owner: nassiharel
      name: scoop-bucket
      token: "{{ .Env.SCOOP_TAP_TOKEN }}"
    directory: bucket
    homepage: https://github.com/nassiharel/klim
    description: >-
      Productivity booster for dev tools — discover, standardise, automate, audit toolchains.
    license: MIT

# winget-pkgs PR: GoReleaser pushes a feature branch to the personal
# fork (nassiharel/winget-pkgs) and opens a PR back to
# microsoft/winget-pkgs:master. The WINGET_PAT secret needs Contents +
# Pull requests: read & write on the fork.
winget:
  - name: klim
    publisher: nassiharel
    publisher_url: https://github.com/nassiharel
    publisher_support_url: https://github.com/nassiharel/klim/issues
    package_identifier: nassiharel.klim
    homepage: https://github.com/nassiharel/klim
    short_description: >-
      Productivity booster for dev tools — discover, standardise, automate, audit toolchains.
    description: |
      klim is a productivity booster for dev tools: a deterministic, cross-platform
      layer for discovering, standardising, securing, and automating the tools every
      project depends on. It keeps native package managers in charge of installation
      while giving humans, teams, CI, and AI agents the same portable environment
      contracts and predictable operations.
    license: MIT
    license_url: https://github.com/nassiharel/klim/blob/main/LICENSE
    copyright: Copyright (c) 2026 Nassi Harel
    release_notes_url: https://github.com/nassiharel/klim/releases/tag/v{{ .Version }}
    tags:
      - cli
      - developer-tools
      - package-manager
      - devops
      - productivity
    repository:
      owner: nassiharel
      name: winget-pkgs
      branch: "klim-{{ .Version }}"
      token: "{{ .Env.WINGET_PAT }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

sboms:
  - artifacts: archive

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-devel"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Dependencies
      regexp: '^.*?(deps|build\(deps\))(\(.+\))?\!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: nassiharel
    name: klim
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    **Quick install (macOS/Linux):**
    ```
    curl -fsSL https://raw.githubusercontent.com/nassiharel/klim/main/install.sh | bash
    ```

    **Quick install (Windows PowerShell):**
    ```
    irm https://raw.githubusercontent.com/nassiharel/klim/main/install.ps1 | iex
    ```

    **Homebrew**: `brew install nassiharel/tap/klim`
    **Scoop**: `scoop bucket add nassiharel https://github.com/nassiharel/scoop-bucket`, then `scoop install klim`
    **winget**: `winget install nassiharel.klim` (after Microsoft moderators merge the auto-submitted PR)
    **Go**: `go install github.com/nassiharel/klim/cmd/klim@v{{ .Version }}`
    **Debian/Ubuntu**: `sudo dpkg -i klim_{{ .Version }}_linux_amd64.deb`
    **RPM**: `sudo rpm -i klim_{{ .Version }}_linux_amd64.rpm`
    **Binary**: Download from the assets below
