name: Feature Request
description: Suggest an enhancement or new feature
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: What would you like to be added?
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Why is this needed?
      description: What problem does this solve or what use case does it enable?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false
