name: Bug Report
description: Report a bug encountered while using klim
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues
          required: true
        - label: I have tested with the latest version of klim
          required: false

  - type: input
    attributes:
      label: klim version
      description: Output of `klim version`
      placeholder: "e.g. v1.0.0 (abc1234)"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Operating system
      options:
        - label: Windows
        - label: macOS
        - label: Linux

  - type: textarea
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the problem.
      placeholder: |
        1. Run `klim ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
    validations:
      required: false
