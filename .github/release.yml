changelog:
  exclude:
    labels:
      - ignore-for-release
      - chore
      - ci
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bugfix
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "📖 Documentation"
      labels:
        - docs
    - title: "🔧 Other Changes"
      labels:
        - "*"
