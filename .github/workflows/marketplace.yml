name: Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'marketplace/**'
      - 'scripts/assemble-marketplace/**'
      - 'scripts/validate-marketplace/**'
  pull_request:
    paths:
      - 'marketplace/**'
      - 'scripts/assemble-marketplace/**'
      - 'scripts/validate-marketplace/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Validate marketplace files
        run: go run ./scripts/validate-marketplace
      - name: Assemble and verify
        run: |
          go run ./scripts/assemble-marketplace -o /tmp/assembled.yaml
          echo "Assembled marketplace.yaml successfully"

  publish:
    name: Publish
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Assemble marketplace
        run: go run ./scripts/assemble-marketplace -o marketplace.yaml
      - name: Publish to marketplace branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a detached commit with only marketplace.yaml
          git checkout --orphan marketplace-staging
          git rm -rf .
          git add marketplace.yaml
          git commit -m "Update marketplace catalog"
          git push -f origin marketplace-staging:marketplace
