name: Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'marketplace/**'
      - 'internal/marketplace/**'
  pull_request:
    paths:
      - 'marketplace/**'
      - 'internal/marketplace/**'
  schedule:
    # Run every night at 03:00 UTC to refresh GitHub metadata (stars, last push, etc.).
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Validate marketplace files
        run: go run ./internal/marketplace/validate
      - name: Create empty fallback for assemble smoke test
        run: : > /tmp/fallback.yaml
      - name: Assemble smoke test
        run: go run ./internal/marketplace/assemble -fallback /tmp/fallback.yaml -o /tmp/marketplace.yaml

  publish:
    name: Publish
    needs: validate
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Fetch previous marketplace.yaml as fallback
        run: |
          git fetch origin marketplace --depth=1 || true
          git show origin/marketplace:marketplace.yaml > /tmp/fallback.yaml 2>/dev/null || true
      - name: Assemble
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./internal/marketplace/assemble -fetch-github -fallback /tmp/fallback.yaml -o /tmp/marketplace.yaml
      - name: Publish to marketplace branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a clean orphan branch, then copy in the assembled file.
          git checkout --orphan marketplace-staging
          git rm -rf --ignore-unmatch .
          git clean -fdx
          cp /tmp/marketplace.yaml marketplace.yaml
          git add marketplace.yaml
          git commit -m "Update marketplace catalog"
          git push -f origin marketplace-staging:marketplace
