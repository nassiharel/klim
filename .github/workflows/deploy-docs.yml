name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**', 'marketplace/**']
  workflow_run:
    workflows: ["Marketplace"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Fetch assembled marketplace from marketplace branch
        working-directory: .
        run: |
          git fetch origin marketplace --depth=1 2>/dev/null || true
          git show origin/marketplace:marketplace.yaml > marketplace.yaml 2>/dev/null || echo "marketplace branch not available"
      - name: Generate marketplace catalog page
        working-directory: .
        run: go run docs/scripts/gen-marketplace-page.go
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
