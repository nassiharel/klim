name: Deploy Pages

# Combined GitHub Pages deploy: the website lives at the site root and
# the documentation Starlight build is mounted under /docs/.
#
# Pages can only host one site per repository, so this workflow is the
# single authority for `actions/deploy-pages@v5`. The previous
# deploy-website.yml and deploy-docs.yml workflows fought each other
# (last-deploy-wins) and have been removed.
#
# Triggers:
#   - Pushes that change website/** or docs/** rebuild and redeploy.
#   - The Marketplace workflow finishing on main re-runs the deploy so
#     a fresh marketplace.yaml shows up in the docs catalog page.
#   - Manual dispatch via the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_run:
    workflows: ["Marketplace"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages only stores one in-flight deployment per environment. Cancel
# any superseded run so a fast burst of pushes doesn't queue up
# multiple redundant deploys.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip the run when the upstream Marketplace workflow failed —
    # publishing the previous-good docs would silently mask a CI
    # failure that the operator needs to see.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      # Go is needed for the docs catalog generator (gen-marketplace-page.go).
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Marketplace branch holds the assembled catalog YAML used by
      # the docs site to render its catalog page. Soft-fail when the
      # branch isn't available so a brand-new fork can still deploy
      # without a marketplace branch having been published yet.
      - name: Fetch assembled marketplace from marketplace branch
        run: |
          git fetch origin marketplace --depth=1 2>/dev/null || true
          git show origin/marketplace:marketplace.yaml > marketplace.yaml 2>/dev/null \
            || echo "marketplace branch not available — docs will render with an empty catalog"

      - name: Generate marketplace catalog page
        run: go run docs/scripts/gen-marketplace-page.go

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          # Cache against both lockfiles so a change in either kicks
          # the cache without false reuse.
          cache-dependency-path: |
            website/package-lock.json
            docs/package-lock.json

      # --- Build website (root) ---
      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      # --- Build docs (mounted under /docs/) ---
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        # base="/docs/" is the default in docs/astro.config.mjs; we
        # set it explicitly here too so the workflow file is the
        # one source of truth for the deployment shape.
        env:
          KLIM_DOCS_BASE: /docs/
        run: npm run build

      # --- Combine into a single Pages artifact ---
      # Layout written into `_pages/`:
      #   _pages/                  ← website/dist/* (root)
      #   _pages/docs/             ← docs/dist/* (Starlight)
      - name: Assemble combined Pages artifact
        run: |
          mkdir -p _pages/docs
          cp -r website/dist/. _pages/
          cp -r docs/dist/. _pages/docs/
          # Light sanity check: the website must have an index.html and
          # docs must have produced something. Failing fast here is
          # cheaper than diagnosing a 404 after the deploy lands.
          test -f _pages/index.html
          test -d _pages/docs
          ls -la _pages
          ls -la _pages/docs

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
