name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # Monday 4:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go

      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      # Skip SARIF upload — requires GitHub Advanced Security (paid for private repos).
      # The analysis still runs and logs findings in the workflow output.
      # To enable the Security tab, either make the repo public or enable GHAS,
      # then replace this step with: github/codeql-action/analyze@...
      - name: Export SARIF
        run: |
          echo "CodeQL analysis complete. SARIF upload skipped (private repo)."
          echo "To review results, check the 'Autobuild' step logs above."
