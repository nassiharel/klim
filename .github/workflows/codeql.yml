name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # Monday 4:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go

      - uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      # Skip SARIF upload — requires GitHub Advanced Security (paid for private repos).
      # The analysis still runs and logs findings in the workflow output.
      # To enable the Security tab, either make the repo public or enable GHAS,
      # then replace this step with: github/codeql-action/analyze@...
      - name: Export SARIF
        run: |
          echo "CodeQL analysis complete. SARIF upload skipped (private repo)."
          echo "To review results, check the 'Autobuild' step logs above."
