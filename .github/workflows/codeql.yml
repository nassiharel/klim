name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1" # Monday 4:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: go

      - uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

      # Skip SARIF upload — requires GitHub Advanced Security (paid for private repos).
      # The analysis still runs and logs findings in the workflow output.
      # To enable the Security tab, either make the repo public or enable GHAS,
      # then replace this step with: github/codeql-action/analyze@...
      - name: Export SARIF
        run: |
          echo "CodeQL analysis complete. SARIF upload skipped (private repo)."
          echo "To review results, check the 'Autobuild' step logs above."
