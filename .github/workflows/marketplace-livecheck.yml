name: Marketplace Live Check

# Opt-in integration test that probes every package ID in
# marketplace/tools/*.yaml against the live package manager on each
# supported runner. Not wired to PRs because it takes many minutes and
# depends on external services (winget/choco/brew/apt/npm registries).

on:
  schedule:
    # Weekly, Monday 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  livecheck:
    name: livecheck (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Linux runners come with apt + npm preinstalled. brew and snap are
      # optional — we skip them rather than installing (keeps the job fast
      # and the test already skips PMs whose binary isn't on PATH).
      - name: Refresh apt cache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update

      # macOS runners have brew + npm preinstalled; nothing else needed.

      # Windows runners have winget + choco preinstalled. Install scoop so
      # every Windows-relevant PM gets exercised.
      - name: Install Scoop (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\scoop\shims" -Encoding utf8

      - name: Run live check
        run: go test -tags=integration -v -timeout=40m -count=1 ./internal/marketplace/livecheck/...
