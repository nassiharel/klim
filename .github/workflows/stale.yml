name: Stale

on:
  schedule:
    - cron: "30 2 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has been
            open for 90 days with no activity. It will be closed in 30 days if no
            further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            been open for 90 days with no activity. It will be closed in 30 days if
            no further activity occurs.
          days-before-stale: 90
          days-before-close: 30
          exempt-issue-labels: "keep open,in progress"
          exempt-pr-labels: "keep open,in progress"
          operations-per-run: 100
