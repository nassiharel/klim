  <path d="M336 24h126c17.7 0 32 14.3 32 32v48c0 17.7-14.3 32-32 32H336c-17.7 0-32-14.3-32-32V56c0-17.7 14.3-32 32-32Z" fill="#0f172a" opacity="0.7"/>
