<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Layered K — the original stacked-chevron concept rotated into a "k"
    Three nested < chevrons (dim→bright, outer→inner) radiate from the stem.
    Each chevron = a < terminal symbol. Together they form k = |<
    The layering suggests signal strength / radiating orchestration.
  -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- | stem (pipe) -->
    <line x1="14" y1="8" x2="14" y2="56" stroke="#00e5ff" stroke-width="4.5"/>
    <!-- outer < (widest reach, dimmest) -->
    <polyline points="50,10 16,32 50,54" stroke="#0080a0" stroke-width="3.5"/>
    <!-- middle < -->
    <polyline points="38,18 16,32 38,46" stroke="#00b0d0" stroke-width="3.5"/>
    <!-- inner < (shortest reach, brightest) -->
    <polyline points="28,25 16,32 28,39" stroke="#00e5ff" stroke-width="3.5"/>
  </g>
</svg>
