{{define "content"}}
{{$d := .Data}}
<section class="page-header">
  <h1>Config</h1>
  <p class="muted">Running configuration (read-only). Editor coming in a future release.</p>
</section>

{{if $d.Error}}
<section class="card">
  <p class="muted">{{$d.Error}}</p>
</section>
{{else}}
<section class="card">
  <pre class="log">{{$d.YAML}}</pre>
  <p class="muted small">This file lives at <code>~/.config/clim/config.yaml</code>. Edits there take effect on next launch.</p>
</section>
{{end}}
{{end}}
