# clim — Tool Definitions
# Edit this file to add, remove, or configure tools.
# Set enabled: false to hide a tool from clim.

tools:
  # --- Version Control ---
  - name: git
    display_name: Git
    category: VCS
    enabled: true
    binary_names: [git]
    packages:
      winget: "Git.Git"
      choco: "git"
      brew: "git"
      apt: "git"

  - name: gh
    display_name: GitHub CLI
    category: VCS
    enabled: true
    binary_names: [gh]
    packages:
      winget: "GitHub.cli"
      choco: "gh"
      brew: "gh"
      apt: "gh"

  # --- Cloud CLIs ---
  - name: az
    display_name: Azure CLI
    category: Cloud
    enabled: true
    binary_names: [az]
    packages:
      winget: "Microsoft.AzureCLI"
      choco: "azure-cli"
      brew: "azure-cli"
      apt: "azure-cli"

  - name: azd
    display_name: Azure Dev CLI
    category: Cloud
    enabled: true
    binary_names: [azd]
    packages:
      winget: "Microsoft.Azd"
      brew: "azure/azd/azd"

  - name: aws
